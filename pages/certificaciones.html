<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Certificaciones — Dilmer Moreira</title>
    <script src="../assets/js/gtag-loader.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles/stylesheet.css?v=20250823" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: {
                preflight: false,
            }
        }
    </script>
    <style>
        body {
            background: #0b0b10 !important;
            color: #e7e9ee;
            overflow-x: hidden;
        }

        .coming-soon-container {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            background: rgba(124, 92, 255, 0.1);
            border: 1px solid rgba(124, 92, 255, 0.2);
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .gradient-text {
            background: linear-gradient(to right, #7c5cff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .decoration-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124, 92, 255, 0.15) 0%, transparent 70%);
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="navbar-root"></div>

    <main class="container">
        <div class="coming-soon-container">
            <div class="decoration-glow"></div>
            <div class="status-badge" data-reveal>Próximamente</div>
            <h1 class="gradient-text" data-reveal>Mis Certificaciones</h1>
            <p class="subtitle max-w-lg mt-4 opacity-70" data-reveal>
                Estoy organizando mis logros y certificaciones académicas para compartirlos contigo.
                Vuelve pronto para ver la galería completa de mi trayectoria profesional.
            </p>

            <div class="mt-12 flex gap-4" data-reveal>
                <a href="../index.html" class="btn btn--primary px-8">Volver al Inicio</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer__inner">
            <div class="footer__left">© <span id="year"></span> Dilmer — Todos los derechos reservados</div>
            <div class="footer__center">
                <div id="floating-dock-root"></div>
            </div>
            <div class="footer__right"><a href="../index.html" class="back-to-top">← Volver</a></div>
        </div>
    </footer>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
    <script type="text/babel" src="../scripts/floating-dock.js"></script>
    <script type="text/babel" src="../scripts/react-navbar.js"></script>

    <script>
        document.getElementById('year') && (document.getElementById('year').textContent = new Date().getFullYear());

        // Simple reveal handler for consistency
        window.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('[data-reveal]');
            reveals.forEach((el, i) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                    el.classList.add('is-visible');
                }, i * 150);
            });
        });
    </script>
</body>

</html>
